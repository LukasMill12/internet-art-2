function generateNoiseTexture(){
  const imgData=noiseCtx.createImageData(NOISE_SIZE,NOISE_SIZE), data=imgData.data;

  for(let i=0;i<data.length;i+=4){
    const j=(Math.random()-0.5)*40;
    data[i]=Math.max(0,Math.min(255,baseR+j));
    data[i+1]=Math.max(0,Math.min(255,baseG+j));

  noiseCtx.putImageData(imgData,0,0);

  noiseCtx.filter="blur(0.4px)";

}

let roughSeed=12345;
function seededRandom(){
  roughSeed ^= roughSeed << 13;
  roughSeed ^= roughSeed >> 17;
  roughSeed ^= roughSeed << 5;

}
function drawRoughCircle(x,y,r,jitter){
  const steps=256, as=(Math.PI*2)/steps;
  ctx.beginPath();
  for(let i=0;i<=steps;i++){
    const a=i*as, jr=(seededRandom()*2-1)*jitter, rr=r+jr;
    const px=x+Math.cos(a)*rr, py=y+Math.sin(a)*rr;
    i===0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
  }
  ctx.closePath();
}

function clamp(v,min,max){ return Math.max(min,Math.min(max,v)); }

function quadraticPoint(p0,p1,p2,t){
  const mt = 1 - t;
  return {
    x: mt*mt*p0.x + 2*mt*t*p1.x + t*t*p2.x,
    y: mt*mt*p0.y + 2*mt*t*p1.y + t*t*p2.y
  };
}
function cubicPoint(p0,p1,p2,p3,t){
  const mt = 1 - t;
  return {
    x: mt*mt*mt*p0.x + 3*mt*mt*t*p1.x + 3*mt*t*t*p2.x + t*t*t*p3.x,
    y: mt*mt*mt*p0.y + 3*mt*mt*t*p1.y + 3*mt*t*t*p2.y + t*t*t*p3.y
  };
}

function flattenCommandsToContours(commands, curveSteps = 18){
  const contours = [];
  let current = [];
  let cx = 0, cy = 0;
  let sx = 0, sy = 0;

  function push(x,y){ current.push({x,y}); }
  function finishCurrent(){
    if(current.length > 1) contours.push(current);
    current = [];
  }

  for(let i=0;i<commands.length;i++){
    const cmd = commands[i];

    if(cmd.type === "M"){
      finishCurrent();
      cx = sx = cmd.x;
      cy = sy = cmd.y;
      push(cx, cy);

    } else if(cmd.type === "L"){
      for(let j=1;j<=3;j++){
        const t = j / 3;
        push(cx + (cmd.x - cx) * t, cy + (cmd.y - cy) * t);
      }
      cx = cmd.x;
      cy = cmd.y;

    } else if(cmd.type === "Q"){
      const p0 = {x:cx, y:cy};
      const p1 = {x:cmd.x1, y:cmd.y1};
      const p2 = {x:cmd.x, y:cmd.y};
      for(let j=1;j<=curveSteps;j++){
        const t = j / curveSteps;
        const p = quadraticPoint(p0,p1,p2,t);
        push(p.x, p.y);
      }
      cx = cmd.x;
      cy = cmd.y;

    } else if(cmd.type === "C"){
      const p0 = {x:cx, y:cy};
      const p1 = {x:cmd.x1, y:cmd.y1};
      const p2 = {x:cmd.x2, y:cmd.y2};
      const p3 = {x:cmd.x, y:cmd.y};
      for(let j=1;j<=curveSteps;j++){
        const t = j / curveSteps;
        const p = cubicPoint(p0,p1,p2,p3,t);
        push(p.x, p.y);
      }
      cx = cmd.x;
      cy = cmd.y;

    } else if(cmd.type === "Z"){
      for(let j=1;j<=3;j++){
        const t = j / 3;
        push(cx + (sx - cx) * t, cy + (sy - cy) * t);
      }
      cx = sx;
      cy = sy;
      finishCurrent();
    }
  }

  finishCurrent();
  return contours;
}

function resampleContour(points, step = CONTINUE_PARTICLE_STEP){
  if(points.length < 2) return points.slice();

  let total = 0;
  const seg = [];

  for(let i=1;i<points.length;i++){
    const d = Math.hypot(points[i].x - points[i-1].x, points[i].y - points[i-1].y);
    seg.push(d);
    total += d;
  }

  const count = Math.max(2, Math.round(total / step));
  const out = [];

  for(let k=0;k<count;k++){
    const target = total * (count === 1 ? 0 : k / (count - 1));
    let run = 0;

    for(let i=1;i<points.length;i++){
      const d = seg[i-1];
      if(run + d >= target){
        const t = d ? (target - run) / d : 0;
        out.push({
          x: points[i-1].x + (points[i].x - points[i-1].x) * t,
          y: points[i-1].y + (points[i].y - points[i-1].y) * t
        });
        break;
      }
      run += d;
    }
  }

  return out;
}

function getBounds(points){
  if(!points.length){
    return { minX:0, minY:0, maxX:0, maxY:0, width:0, height:0 };
  }

  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for(const p of points){
    if(p.x < minX) minX = p.x;
    if(p.y < minY) minY = p.y;
    if(p.x > maxX) maxX = p.x;
    if(p.y > maxY) maxY = p.y;
  }

  return {
    minX, minY, maxX, maxY,
    width: maxX - minX,
    height: maxY - minY
  };
}

function buildContinueLetterPoints(){
  if(!_otFontReady || !_otFont) return;

  const WORD = "CONTINUE";
  const b = { x: sentenceBoxX, y: sentenceBoxY, w: sentenceBoxW, h: sentenceBoxH };
  const baseFontSize = b.h * 0.80;
  let penX = 0;
  const rawContours = [];

  for(let i=0;i<WORD.length;i++){
    const ch = WORD[i];
    const glyph = _otFont.charToGlyph(ch);
    const path = glyph.getPath(penX, 0, baseFontSize);
    const contours = flattenCommandsToContours(path.commands, 20);
    for(const c of contours) rawContours.push(c);
    penX += glyph.advanceWidth * baseFontSize / _otFont.unitsPerEm;
  }

  const rawPoints = [];
  for(const contour of rawContours){
    for(const p of contour) rawPoints.push(p);
  }

  if(!rawPoints.length){
    continueLetterPoints = [];
    continueLetterPointsBuilt = true;
    return;
  }

  const bounds = getBounds(rawPoints);
  const safeW = b.w * 0.72;
  const safeH = b.h * 0.40;
  const scale = Math.min(
    safeW / Math.max(bounds.width, 1),
    safeH / Math.max(bounds.height, 1)
  );

  const scaledContours = rawContours.map(contour =>
    contour.map(p => ({
      x: (p.x - bounds.minX) * scale,
      y: (p.y - bounds.minY) * scale
    }))
  );

  const scaledPoints = [];
  for(const contour of scaledContours){
    for(const p of contour) scaledPoints.push(p);
  }

  const scaledBounds = getBounds(scaledPoints);
  const offsetX = b.x + (b.w - scaledBounds.width) * 0.5;
  const offsetY = b.y + (b.h - scaledBounds.height) * 0.5;

  const centeredContours = scaledContours.map(contour =>
    contour.map(p => ({
      x: p.x + offsetX,
      y: p.y + offsetY
    }))
  );

  const dense = [];
  for(const contour of centeredContours){
    const sampled = resampleContour(contour, CONTINUE_PARTICLE_STEP);
    for(const p of sampled) dense.push(p);
  }

  continueLetterPoints = dense;
  continueLetterPointsBuilt = true;

  if(continueLetterPoints.length){
    for(let i=0;i<continueParticles.length;i++){
      const idx = Math.floor(i / continueParticles.length * continueLetterPoints.length);
      continueParticles[i].targetIndex = idx;
    }
  }
}

function drawSingleBelt(bandY,beltText,beltCharCount,extraOffset=0,highlight=false){
  const {x:cx,y:cy,r}=heroCircle, fontSize=r*BELT_FONT_REL;
  ctx.font=`bold ${fontSize}px "Supreme", system-ui, sans-serif`;
  ctx.textBaseline="middle";
  ctx.textAlign="center";

  const totalArc=Math.PI*1.6, latRatio=bandY/r;
  const clampedLatRatio=Math.max(-0.999,Math.min(0.999,latRatio));
  const theta=Math.asin(clampedLatRatio), latCos=Math.cos(theta);
  const radiusAtLat=r*latCos+r*BELT_DEPTH_OFFSET;

  const visibleChars=Math.max(12,Math.floor(totalArc*radiusAtLat/(fontSize*BELT_CHAR_WIDTH_FACTOR)));
  const charAngleStep=totalArc/visibleChars;

  const totalOffset=beltOffset+extraOffset, wholeOffset=Math.floor(totalOffset), fracOffset=totalOffset-wholeOffset;
  const startI=-Math.floor(visibleChars/2), endI=Math.ceil(visibleChars/2);

  for(let i=startI;i<=endI;i++){
    const shiftedI=i-fracOffset, angle=shiftedI*charAngleStep, depth=Math.cos(angle);
    if(depth<=BELT_EDGE_HIDE) continue;

    const xOnCircle=Math.sin(angle)*radiusAtLat;
    const screenX=cx+xOnCircle, screenY=cy+bandY;
    const charIndex=((wholeOffset+i)%beltCharCount+beltCharCount)%beltCharCount;
    const ch=beltText[charIndex];
    const alpha=0.35+((depth-BELT_EDGE_HIDE)/(1-BELT_EDGE_HIDE))*0.55;
    const inHighlight=highlight&&beltHighlightActive&&depth>=(1-beltHighlightWidth);

    ctx.save();
    ctx.translate(screenX,screenY);

    let fill="#111";
    if(inHighlight){
      const f=beltHighlightFade;
      fill=`rgb(${Math.round(17+(255-17)*f)},${Math.round(17+(255-17)*f)},${Math.round(17+(255-17)*f)})`;
    }

    ctx.globalAlpha=Math.max(0,Math.min(1,alpha));
    ctx.fillStyle=fill;
    ctx.fillText(ch,0,0);
    ctx.restore();
  }

  ctx.globalAlpha=1;
}

function drawTextBelt(){
  if(!heroCircleVisible||!page2.classList.contains("active")||!beltActive) return;

  beltOffset+=(beltTargetOffset-beltOffset)*0.85;

  const centerBandY=Math.max(-maxBandY,Math.min(maxBandY,beltY));
  const rowGap=r*0.12;

  drawSingleBelt(centerBandY-rowGap,BELT_ROWS[0].text,BELT_ROWS[0].count,beltBaseOffsets[0],beltHighlightRow===0);
  drawSingleBelt(centerBandY,       BELT_ROWS[1].text,BELT_ROWS[1].count,beltBaseOffsets[1],beltHighlightRow===1);
  drawSingleBelt(centerBandY+rowGap,BELT_ROWS[2].text,BELT_ROWS[2].count,beltBaseOffsets[2],beltHighlightRow===2);
}

function pointInPill(px,py,line,dotsArr,reverseAnim,slideAnim){
  if(!line.active||!page2.classList.contains("active")) return false;
  if(reverseAnim||slideAnim) return false;
  const center=dotsArr[1];
  if(!center) return false;
  const radius=center.r??DOT_R;
  const top=Math.min(line.y1,line.y2), bottom=Math.max(line.y1,line.y2);
  if(px>=center.x-radius&&px<=center.x+radius&&py>=top&&py<=bottom) return true;
  if((px-center.x)**2+(py-top)**2<=radius*radius) return true;
  if((px-center.x)**2+(py-bottom)**2<=radius*radius) return true;
  return false;
}

function resize(){
  const rect=canvas.getBoundingClientRect();
  dpr=Math.max(1,Math.floor(window.devicePixelRatio||1));
  canvas.width=rect.width*dpr;
  canvas.height=rect.height*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  W=rect.width;
  H=rect.height;

  buildDots();
  setDotsToHome();
  updateHeroCircle();
  updateSentenceLineLayout();
  reset();
  render();
}

function reset(){
  drawing=false;
  strokePts=[];
  nextIdx=completed?dots.length:0;
  movedSinceDown=false;

  if(BYPASS_PUZZLE||completed) enterBtn.classList.add("ready");
  else enterBtn.classList.remove("ready");
}

function buildDots(){
  const P=[
    [0.06,0.18],[0.06,0.30],[0.06,0.44],[0.06,0.58],[0.22,0.58],[0.20,0.18],
    [0.26,0.58],[0.26,0.18],[0.36,0.18],[0.42,0.18],[0.39,0.18],[0.39,0.58],
    [0.54,0.18],[0.48,0.18],[0.48,0.36],[0.52,0.36],[0.48,0.58],[0.54,0.58],
    [0.70,0.58],[0.68,0.18],[0.74,0.58],[0.74,0.18],[0.84,0.18],[0.90,0.18],[0.87,0.18],[0.87,0.58],
  ];
  const bandTop=H*0.56, bandH=H*0.34, left=W*0.10, bandW=W*0.80;
  dotsHome=P.map((p,i)=>({
    x:left+p[0]*bandW,
    y:bandTop+p[1]*bandH,
    label:String(i+1).padStart(2,"0")
  }));
}
function setDotsToHome(){ dots=dotsHome.map(d=>({...d})); }
function setPointer(e){
  const r=canvas.getBoundingClientRect(), src=(e.touches&&e.touches[0])?e.touches[0]:e;
  pointer.x=src.clientX-r.left;
  pointer.y=src.clientY-r.top;
}
function dist2(ax,ay,bx,by){ const dx=ax-bx,dy=ay-by; return dx*dx+dy*dy; }
function appendPoint(x,y){
  const last=strokePts[strokePts.length-1];
  if(!last){ strokePts.push({x,y}); return; }
  const dx=x-last.x,dy=y-last.y;
  if(dx*dx+dy*dy>0.25) strokePts.push({x,y});
}
function completeIfDone(){
  if(nextIdx>=dots.length){
    completed=true;
    enterBtn.classList.add("ready");
    drawing=false;
  }
}
function hitCurrentDotClick(){
  const d=dots[nextIdx];
  if(!d) return false;
  if(dist2(pointer.x,pointer.y,d.x,d.y)<=CLICK_HIT_R*CLICK_HIT_R){
    appendPoint(d.x,d.y);
    nextIdx++;
    completeIfDone();
    markPuzzleStarted();
    return true;
  }
  return false;
}
function hitCurrentDotDrag(){
  const d=dots[nextIdx];
  if(!d) return false;
  if(dist2(pointer.x,pointer.y,d.x,d.y)<=DRAG_HIT_R*DRAG_HIT_R){
    appendPoint(pointer.x,pointer.y);
    nextIdx++;
    completeIfDone();
    markPuzzleStarted();
    return true;
  }
  return false;
}
function maybeAddFreePoint(){
  if(!drawing||completed||BYPASS_PUZZLE) return;
  const last=strokePts[strokePts.length-1];
  if(!last){
    strokePts.push({x:pointer.x,y:pointer.y});
    return;
  }
  const dx=pointer.x-last.x,dy=pointer.y-last.y;
  if(dx*dx+dy*dy>=2.5*2.5) strokePts.push({x:pointer.x,y:pointer.y});
}

let playingTransition=false;

function onDown(e){
  if(BYPASS_PUZZLE) return;
  if(playingTransition||!page1.classList.contains("active")) return;

  setPointer(e);
  pressStart.x=pointer.x;
  pressStart.y=pointer.y;
  movedSinceDown=false;
  drawing=true;

  if(nextIdx===0){
    const d=dots[0];
    if(dist2(pointer.x,pointer.y,d.x,d.y)<=CLICK_HIT_R*CLICK_HIT_R){
      appendPoint(d.x,d.y);
      nextIdx=1;
      completeIfDone();
      markPuzzleStarted();
      render();
      return;
    }
    drawing=false;
  } else {
    appendPoint(pointer.x,pointer.y);
    if(strokePts.length>0) markPuzzleStarted();
  }
  render();
}
function onMove(e){
  if(BYPASS_PUZZLE) return;
  if(!drawing||playingTransition||!page1.classList.contains("active")) return;

  setPointer(e);
  const dx0=pointer.x-pressStart.x,dy0=pointer.y-pressStart.y;
  if(dx0*dx0+dy0*dy0>CLICK_MOVE_TOL*CLICK_MOVE_TOL) movedSinceDown=true;

  if(movedSinceDown){
    maybeAddFreePoint();
    hitCurrentDotDrag();
    if(strokePts.length>0) markPuzzleStarted();
  } else {
    maybeAddFreePoint();
  }
  render();
}
function onUp(e){
  if(BYPASS_PUZZLE) return;
  if(!page1.classList.contains("active")){
    drawing=false;
    return;
  }

  setPointer(e);

  if(drawing){
    if(movedSinceDown){
      appendPoint(pointer.x,pointer.y);
      hitCurrentDotDrag();
    } else {
      hitCurrentDotClick();
    }
  }

  drawing=false;
  render();
}

canvas.addEventListener("mousedown",onDown);
window.addEventListener("mousemove",onMove);
window.addEventListener("mouseup",onUp);
canvas.addEventListener("touchstart",e=>{e.preventDefault();onDown(e);},{passive:false});
canvas.addEventListener("touchmove",e=>{e.preventDefault();onMove(e);},{passive:false});
window.addEventListener("touchend",e=>{
  if(!e.changedTouches||!e.changedTouches.length) return;
  const t=e.changedTouches[0];
  onUp({clientX:t.clientX,clientY:t.clientY});
},{passive:false});

function drawPillLoader(lineObj,dotsArr,load,color){
  if(!lineObj.active||!page2.classList.contains("active")||load<=0) return;
  const center=dotsArr[1];
  if(!center) return;
  const radius=center.r??DOT_R, top=Math.min(lineObj.y1,lineObj.y2), bottom=Math.max(lineObj.y1,lineObj.y2);
  const outlineTop=top-radius, outlineBottom=bottom+radius, height=outlineBottom-outlineTop;
  const width=radius*2, x=center.x-radius, y=outlineTop, r=radius;

  ctx.save();
  ctx.strokeStyle=color;
  ctx.lineWidth=Math.max(2,radius*0.32);
  ctx.lineCap="round";
  ctx.lineJoin="round";
  const perimeter=2*(height-2*r)+2*Math.PI*r;
  ctx.setLineDash([perimeter]);
  ctx.lineDashOffset=perimeter*(1-load);

  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+width-r,y);
  ctx.arcTo(x+width,y,x+width,y+r,r);
  ctx.lineTo(x+width,y+height-r);
  ctx.arcTo(x+width,y+height,x+width-r,y+height,r);
  ctx.lineTo(x+r,y+height);
  ctx.arcTo(x,y+height,x,y+height-r,r);
  ctx.lineTo(x,y+r);
  ctx.arcTo(x,y,x+r,y,r);
  ctx.stroke();

  ctx.setLineDash([]);
  ctx.restore();
}
function drawCornerLineLoader(){ drawPillLoader(cornerLine,cornerDots,cornerLineLoad,"#F71F08"); }
function drawCenterLineLoader(){ drawPillLoader(centerLine,centerDots,centerLineLoad,"#F71F08"); }
function drawLeftLineLoader(){ drawPillLoader(leftLine,leftDots,leftLineLoad,"#F71F08"); }
function drawBlankLineLoader(){ drawPillLoader(blankLine,blankDots,blankLineLoad,"#F71F08"); }
function drawThirdPillLineLoader(){ drawPillLoader(thirdPillLine,thirdPillDots,thirdPillLineLoad,"#F71F08"); }
function drawFourthPillLineLoader(){ drawPillLoader(fourthPillLine,fourthPillDots,fourthPillLineLoad,"#F71F08"); }

function drawNumberInPill(timestamp,visible,line,dotsArr,anim,animStart,animDur,revAnim,revStart,revDur,label){
  if(!visible||!page2.classList.contains("active")||!line.active) return;
  const center=dotsArr[1];
  if(!center) return;

  let t=1;
  if(anim){
    t=Math.min(1,(timestamp-animStart)/animDur);
    t=t*t*(3-2*t);
  } else if(revAnim){
    const rt=Math.min(1,(timestamp-revStart)/revDur);
    t=1-rt*rt*(3-2*rt);
    if(rt>=1) return;
  }

  const fontSize=DOT_R*2.55, fullH=fontSize*1.35, revealH=fullH*t, bottomY=center.y+fullH*0.5;
  ctx.save();
  ctx.font=`300 ${fontSize}px "Supreme", system-ui, sans-serif`;
  ctx.textAlign="center";
  ctx.textBaseline="middle";
  ctx.fillStyle="rgba(255,255,255,1)";
  ctx.beginPath();
  ctx.rect(center.x-fontSize,bottomY-revealH,fontSize*2,revealH);
  ctx.clip();
  ctx.fillText(label,center.x,center.y+1);
  ctx.restore();
}
function drawCornerNumber(ts){

      cornerNumberReverseAnim=false;

    }

}
function drawCenterNumber(ts){

  if(centerNumberAnim){

}
function drawThirdPillNumber(ts){

  if(thirdPillNumberAnim){
    const t=Math.min(1,(ts-thirdPillNumberStartTime)/thirdPillNumberDuration);
    if(t>=1) thirdPillNumberAnim=false;
  }
}

function drawLeftArrow(timestamp){
  if(!leftArrowVisible||!page2.classList.contains("active")) return;
  const center=cornerDots[1];
  if(!center) return;

  let t=1;
  if(leftArrowAnim){
    t=Math.min(1,(timestamp-leftArrowStartTime)/leftArrowDuration);
    t=t*t*(3-2*t);
    if(t>=1) leftArrowAnim=false;
  } else if(leftArrowReverseAnim){
    const rt=Math.min(1,(timestamp-leftArrowReverseStartTime)/leftArrowReverseDuration);
    t=1-rt*rt*(3-2*rt);
    if(rt>=1){
      leftArrowReverseAnim=false;
      leftArrowVisible=false;
      return;
    }
  }

  const x=center.x-(center.r??DOT_R)*4.5, y=center.y, arm=DOT_R*1.45, shaftLen=DOT_R*3.3, joinInset=DOT_R*0.22;
  ctx.save();
  ctx.strokeStyle="rgba(0,0,0,0.92)";
  ctx.lineWidth=Math.max(2,DOT_R*0.32);
  ctx.lineCap="round";
  ctx.lineJoin="round";
  const shaftPhase=Math.min(1,t/0.55);

  ctx.beginPath();
  ctx.moveTo(x+joinInset,y);
  ctx.lineTo(x+joinInset+shaftLen*shaftPhase,y);
  ctx.stroke();

  if(t>0.55){
    const hp=Math.min(1,(t-0.55)/0.45);
    ctx.beginPath();
    ctx.moveTo(x,y);
    ctx.lineTo(x+arm*hp,y-arm*hp);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(x,y);
    ctx.lineTo(x+arm*hp,y+arm*hp);
    ctx.stroke();
  }
  ctx.restore();
}

function drawRightArrow(timestamp){
  if(!rightArrowVisible||!page2.classList.contains("active")) return;
  const center=centerDots[1];
  if(!center) return;

  let t=1;
  if(rightArrowAnim){

   SQUIGGLE
=========================== */
function buildFullSquigglePoints(){
  const x0=W*0.73, y0=sentenceLineBaseY, drawW=W*0.43, pts=[];
  for(let i=0;i<=420;i++){
    const t=i/420, env=0.30+0.70*Math.sin(t*Math.PI), baseX=x0-drawW*t;
    const xChaos=Math.sin(t*Math.PI*4+0.5)*W*0.082*env+Math.cos(t*Math.PI*6.6+1.1)*W*0.044*env+Math.cos(t*Math.PI*1.6+1.3)*W*0.022*env+Math.sin(t*Math.PI*10.2+2.1)*W*0.009*env;
    const y=y0+Math.sin(t*Math.PI*3+0.3)*H*0.034*env+Math.cos(t*Math.PI*1.8+1.8)*H*0.026*env+Math.sin(t*Math.PI*5.6+0.7)*H*0.016*env;
    pts.push({x:baseX+xChaos,y});
  }
  return pts;
}
function buildRoundedRectPolyline(x,y,w,h,r){
  const pts=[], as=16;
  function pL(x1,y1,x2,y2,s=18){ for(let i=0;i<=s;i++){ const t=i/s; pts.push({x:x1+(x2-x1)*t,y:y1+(y2-y1)*t}); } }
  function pA(cx,cy,rad,a0,a1,s=as){ for(let i=0;i<=s;i++){ const t=i/s, a=a0+(a1-a0)*t; pts.push({x:cx+Math.cos(a)*rad,y:cy+Math.sin(a)*rad}); } }
  pL(x+r,y,x+w-r,y,20); pA(x+w-r,y+r,r,-Math.PI/2,0,as); pL(x+w,y+r,x+w,y+h-r,14); pA(x+w-r,y+h-r,r,0,Math.PI/2,as);
  pL(x+w-r,y+h,x+r,y+h,20); pA(x+r,y+h-r,r,Math.PI/2,Math.PI,as); pL(x,y+h-r,x,y+r,14); pA(x+r,y+r,r,Math.PI,Math.PI*1.5,as);
  return pts;
}
function buildResolvePath(){
  const fullSq=buildFullSquigglePoints(), headIdx=Math.round(sentenceLineProgress*(fullSq.length-1));
  const trail=Math.floor(SNAKE_TRAIL*fullSq.length), tailIdx=Math.max(0,headIdx-trail);
  const squiggleTail=fullSq.slice(tailIdx,headIdx+1); snakeTrailPts=squiggleTail.length;
  const startPt=fullSq[headIdx], rect=buildRoundedRectPolyline(sentenceBoxX,sentenceBoxY,sentenceBoxW,sentenceBoxH,sentenceBoxR), rectStart=rect[0];
  const cp1={x:startPt.x-W*0.03,y:startPt.y-H*0.06}, cp2={x:rectStart.x+W*0.06,y:rectStart.y+H*0.05};
  const tp=[];
  for(let i=0;i<=90;i++){
    const t=i/90;
    tp.push(cubicPoint(startPt,cp1,cp2,rectStart,t));
  }
  resolvePath=[...squiggleTail,...tp,...rect];
  resolveHeadT=(squiggleTail.length-1)/(resolvePath.length-1);
}
function getSentenceShapePoints(){
  if(sentenceLineResolved) return buildRoundedRectPolyline(sentenceBoxX,sentenceBoxY,sentenceBoxW,sentenceBoxH,sentenceBoxR);
  if(sentenceLineResolveAnim&&resolvePath.length>1){
    const totalPts=resolvePath.length, headIdx=Math.min(totalPts-1,Math.round(resolveHeadT*(totalPts-1))), tailIdx=Math.max(0,headIdx-snakeTrailPts);
    return resolvePath.slice(tailIdx,headIdx+1);
  }
  const fullSq=buildFullSquigglePoints(), totalPts=fullSq.length, headIdx=Math.min(totalPts-1,Math.round(sentenceLineProgress*(totalPts-1)));
  if(headIdx<=0) return [fullSq[0],fullSq[0]];
  const trail=Math.floor(SNAKE_TRAIL*totalPts), tailIdx=Math.max(0,headIdx-trail);
  return fullSq.slice(tailIdx,headIdx+1);
}
function drawSentenceShape(){
  if(!sentenceLineActive||!page2.classList.contains("active")) return;
  const pts=getSentenceShapePoints();
  if(!pts.length) return;
  ctx.save();
  ctx.strokeStyle="#111";
  ctx.lineWidth=2.2;
  ctx.lineCap="round";
  ctx.lineJoin="round";
  ctx.beginPath();
  ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x,pts[i].y);
  if(sentenceLineResolved) ctx.closePath();
  ctx.stroke();
  if(!sentenceLineResolved){
    const tip=pts[pts.length-1];
    ctx.fillStyle="#111";
    ctx.beginPath();
    ctx.arc(tip.x,tip.y,0.55,0,Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

/* ===========================
   ORANGE BLOB
=========================== */
function updateBlob(dt){
  if(!blobActive||blobResolved||!page2.classList.contains("active")) return;
  if(blobResolveAnim){
    blobResolveT=Math.min(1,blobResolveT+dt*BLOB_RESOLVE_SPEED);
    if(blobResolveT>=1){
      blobResolveAnim=false;
      blobResolved=true;
      if(!thirdPillSequenceStarted){
        thirdPillSequenceStarted=true;
        setTimeout(()=>{
          buildThirdPillDotsTargets();
          thirdPillDotsVisible=true;
          thirdPillDotsAnim=true;
          thirdPillDotsStartTime=performance.now();
          render();
        }, 1300);
      }
    }
    return;
  }

  const speed=Math.abs(blobMouseVX);
  const speedNorm=clamp(speed/14, 0, 1.6);

  if(speed>0.4) blobDirX=blobMouseVX<0?-1:1;

  blobStretch+=(speedNorm-blobStretch)*0.18;
  blobTail+=(speedNorm*1.1-blobTail)*0.14;
  blobPhase+=speed*0.055;
  blobMouseVX*=0.80;
}

function drawLiquidBlobPath(cx,cy,baseR,morphPhase,dirX,dirY,stretchAmt,tailAmt){
  const N=64, pts=[];
  for(let i=0;i<N;i++){
    const a=(i/N)*Math.PI*2, nx=Math.cos(a), ny=Math.sin(a);
    const dirDot=nx*dirX+ny*dirY;
    const front=Math.max(0,dirDot), back=Math.max(0,-dirDot), side=1-Math.abs(dirDot);
    const wobble=Math.sin(a*2+morphPhase*0.24)*baseR*0.18+Math.cos(a*3-morphPhase*0.15)*baseR*0.11+Math.sin(a*5+morphPhase*0.08)*baseR*0.06;
    const directionalRadius=front*baseR*0.18*stretchAmt+back*baseR*0.72*tailAmt-side*baseR*0.12*stretchAmt;
    const r=Math.max(baseR*0.42,baseR+wobble+directionalRadius);
    const dragShift=(-back*back*baseR*0.65*tailAmt)+(front*front*baseR*0.10*stretchAmt);
    pts.push({x:cx+nx*r+dirX*dragShift, y:cy+ny*r+dirY*dragShift});
  }
  ctx.beginPath();
  ctx.moveTo((pts[N-1].x+pts[0].x)*0.5,(pts[N-1].y+pts[0].y)*0.5);
  for(let i=0;i<N;i++){
    const curr=pts[i], next=pts[(i+1)%N];
    ctx.quadraticCurveTo(curr.x,curr.y,(curr.x+next.x)*0.5,(curr.y+next.y)*0.5);
  }
  ctx.closePath();
}

function drawBlob(){
  if(!blobActive||!page2.classList.contains("active")) return;
  const baseR=Math.min(sentenceBoxW,sentenceBoxH)*0.38;
  ctx.save();
  ctx.fillStyle="#F71F08";

  if(blobResolved){
    const r = sentenceBoxR;
    const x = sentenceBoxX, y = sentenceBoxY, w = sentenceBoxW, h = sentenceBoxH;
    ctx.beginPath();
    ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
    ctx.arcTo(x + w, y, x + w, y + r, r); ctx.lineTo(x + w, y + h - r);
    ctx.arcTo(x + w, y + h, x + w - r, y + h, r); ctx.lineTo(x + r, y + h);
    ctx.arcTo(x, y + h, x, y + h - r, r); ctx.lineTo(x, y + r);
    ctx.arcTo(x, y, x + r, y, r);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
    return;
  }

  if(blobResolveAnim){
    const ease = blobResolveT * blobResolveT * (3 - 2 * blobResolveT);
    const rectCX = sentenceBoxX + sentenceBoxW * 0.5;
    const rectCY = sentenceBoxY + sentenceBoxH * 0.5;
    const targetR = sentenceBoxH * 0.5;
    const phase1 = Math.min(1, ease / BLOB_PHASE_SPLIT);
    const p1 = phase1 * phase1 * (3 - 2 * phase1);
    const currentR = baseR + (targetR - baseR) * p1;
    const deformFade = Math.max(0, 1 - phase1);
    const stretchNow = blobStretch * deformFade;
    const tailNow    = blobTail    * deformFade;

    if(ease <= BLOB_PHASE_SPLIT){
      const N = 64, pts = [];
      for(let i = 0; i < N; i++){
        const a = (i / N) * Math.PI * 2;
        const nx = Math.cos(a), ny = Math.sin(a);
        const dirDot = nx * blobDirX + ny * blobDirY;
        const front = Math.max(0, dirDot), back = Math.max(0, -dirDot), side = 1 - Math.abs(dirDot);
        const wobble = (
          Math.sin(a * 2 + blobPhase * 0.24) * currentR * 0.18 +
          Math.cos(a * 3 - blobPhase * 0.15) * currentR * 0.11 +
          Math.sin(a * 5 + blobPhase * 0.08) * currentR * 0.06
        ) * deformFade;
        const directionalR = front * currentR * 0.18 * stretchNow + back * currentR * 0.72 * tailNow - side * currentR * 0.12 * stretchNow;
        const r = Math.max(currentR * 0.55, currentR + wobble + directionalR);
        const dragShift = (-back * back * currentR * 0.65 * tailNow + front * front * currentR * 0.10 * stretchNow) * deformFade;
        pts.push({ x: rectCX + nx * r + blobDirX * dragShift, y: rectCY + ny * r + blobDirY * dragShift });
      }
      ctx.beginPath();
      ctx.moveTo((pts[63].x + pts[0].x) * 0.5, (pts[63].y + pts[0].y) * 0.5);
      for(let i = 0; i < 64; i++){
        const curr = pts[i], next = pts[(i+1) % 64];
        ctx.quadraticCurveTo(curr.x, curr.y, (curr.x+next.x)*0.5, (curr.y+next.y)*0.5);
      }
      ctx.closePath();
      ctx.fill();
    } else {
      const phase2 = (ease - BLOB_PHASE_SPLIT) / (1 - BLOB_PHASE_SPLIT);
      const p2 = phase2 * phase2 * (3 - 2 * phase2);
      const r = sentenceBoxR;
      const halfH = sentenceBoxH * 0.5;
      const halfW = targetR + (sentenceBoxW * 0.5 - targetR) * p2;
      const x = rectCX - halfW;
      const y = rectCY - halfH;
      const w = halfW * 2;
      const h = sentenceBoxH;
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.arcTo(x + w, y, x + w, y + r, r);
      ctx.lineTo(x + w, y + h - r);
      ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
      ctx.lineTo(x + r, y + h);
      ctx.arcTo(x, y + h, x, y + h - r, r);
      ctx.lineTo(x, y + r);
      ctx.arcTo(x, y, x + r, y, r);
      ctx.closePath();
      ctx.fill();
    }

    ctx.restore();
    return;
  }

  drawLiquidBlobPath(blobCX,blobCY,baseR,blobPhase,blobDirX,blobDirY,blobStretch,blobTail);
  ctx.fill();

  if(blobRevealT < 1){
    const ease = blobRevealT * blobRevealT * (3 - 2 * blobRevealT);
    const innerR = (baseR + baseR * 0.5) * ease;
    const outerR = baseR * 3.5;

    ctx.save();
    const inset = 1.5;
    const bx = sentenceBoxX + inset, by = sentenceBoxY + inset;
    const bw = sentenceBoxW - inset * 2, bh = sentenceBoxH - inset * 2;
    const br = Math.max(0, sentenceBoxR - inset);
    ctx.beginPath();
    ctx.moveTo(bx + br, by);
    ctx.lineTo(bx + bw - br, by);
    ctx.arcTo(bx + bw, by, bx + bw, by + br, br);
    ctx.lineTo(bx + bw, by + bh - br);
    ctx.arcTo(bx + bw, by + bh, bx + bw - br, by + bh, br);
    ctx.lineTo(bx + br, by + bh);
    ctx.arcTo(bx, by + bh, bx, by + bh - br, br);
    ctx.lineTo(bx, by + br);
    ctx.arcTo(bx, by, bx + br, by, br);
    ctx.closePath();
    ctx.clip();

    ctx.fillStyle = "#fff";
    ctx.beginPath();
    ctx.arc(blobCX, blobCY, outerR, 0, Math.PI * 2, false);
    ctx.arc(blobCX, blobCY, innerR, 0, Math.PI * 2, true);
    ctx.fill();
    ctx.restore();
  }

  ctx.restore();
}

/* ===========================
   CONTINUE PARTICLES
=========================== */
function initTextStrokes(){
  textStrokesActive = true;
  textStrokesResolved = false;
  textStrokesResolving = false;
  textStrokeProgress = 0;
  textStrokeTargetProgress = 0;

  continueParticles = [];
  continueLetterPoints = [];
  continueLetterPointsBuilt = false;

  const cx = sentenceBoxX + sentenceBoxW * 0.5;
  const cy = sentenceBoxY + sentenceBoxH * 0.5;

  for(let i=0;i<CONTINUE_PARTICLE_COUNT;i++){
    const rx = (Math.random() - 0.5) * sentenceBoxW * 0.78;
    const ry = (Math.random() - 0.5) * sentenceBoxH * 0.62;
    const a = Math.random() * Math.PI * 2;
    const s = 0.03 + Math.random() * 0.06;

    continueParticles.push({
      x: cx + rx,
      y: cy + ry,
      vx: Math.cos(a) * s,
      vy: Math.sin(a) * s,
      sx: cx + rx,
      sy: cy + ry,
      targetIndex: -1
    });
  }

  if(_otFontReady) buildContinueLetterPoints();
}

function updateTextStrokes(dt){
  if(!textStrokesActive) return;

  if(_otFontReady && !continueLetterPointsBuilt){
    buildContinueLetterPoints();
  }

  const cx = sentenceBoxX + sentenceBoxW * 0.5;
  const cy = sentenceBoxY + sentenceBoxH * 0.5;
  const rxBound = sentenceBoxW * 0.5 - 8;
  const ryBound = sentenceBoxH * 0.5 - 8;

  if(!textStrokesResolving){
    const prev = textStrokeProgress;
    textStrokeProgress += (textStrokeTargetProgress - textStrokeProgress) * 0.12;
    const drive = clamp((textStrokeProgress - prev) * 18, -1, 1);
    const absDrive = Math.abs(drive);

    for(let i=0;i<continueParticles.length;i++){
      const p = continueParticles[i];

      p.vx += (Math.random() - 0.5) * 0.0020;
      p.vy += (Math.random() - 0.5) * 0.0020;

      p.vx += -drive * (0.010 + Math.random() * 0.010);
      p.vy += (Math.random() - 0.5) * 0.003 * absDrive;

      p.vx *= 0.985;
      p.vy *= 0.985;

      p.x += p.vx * dt;
      p.y += p.vy * dt;

      const nx = (p.x - cx) / rxBound;
      const ny = (p.y - cy) / ryBound;
      const d = nx * nx + ny * ny;

      if(d > 1){
        const len = Math.sqrt(d);
        p.x = cx + (nx / len) * rxBound * 0.985;
        p.y = cy + (ny / len) * ryBound * 0.985;
        p.vx *= -0.35;
        p.vy *= -0.35;
      }
    }

    return;
  }

  textStrokeProgress = Math.min(1, textStrokeProgress + dt / CONTINUE_MORPH_DURATION);

  if(!continueLetterPoints.length) return;

  const morph = textStrokeProgress;

  for(let i=0;i<continueParticles.length;i++){
    const p = continueParticles[i];
    const idx = ((p.targetIndex % continueLetterPoints.length) + continueLetterPoints.length) % continueLetterPoints.length;
    const target = continueLetterPoints[idx];
    p.x = p.sx + (target.x - p.sx) * morph;
    p.y = p.sy + (target.y - p.sy) * morph;
  }

  textStrokesResolved = morph >= 0.999;
}

function startTextStrokesResolve(){
  if(!textStrokesActive || textStrokesResolving) return;
  textStrokesResolving = true;
  textStrokeProgress = 0;

  for(let i=0;i<continueParticles.length;i++){
    continueParticles[i].sx = continueParticles[i].x;
    continueParticles[i].sy = continueParticles[i].y;
  }

  if(_otFontReady && !continueLetterPointsBuilt){
    buildContinueLetterPoints();
  }
}

function drawTextStrokes(){
  if(!textStrokesActive || !page2.classList.contains("active")) return;
  if(!continueParticles.length) return;

  ctx.save();

  ctx.beginPath();
  ctx.moveTo(sentenceBoxX + sentenceBoxR, sentenceBoxY);
  ctx.lineTo(sentenceBoxX + sentenceBoxW - sentenceBoxR, sentenceBoxY);
  ctx.arcTo(sentenceBoxX + sentenceBoxW, sentenceBoxY, sentenceBoxX + sentenceBoxW, sentenceBoxY + sentenceBoxR, sentenceBoxR);
  ctx.lineTo(sentenceBoxX + sentenceBoxW, sentenceBoxY + sentenceBoxH - sentenceBoxR);
  ctx.arcTo(sentenceBoxX + sentenceBoxW, sentenceBoxY + sentenceBoxH, sentenceBoxX + sentenceBoxW - sentenceBoxR, sentenceBoxY + sentenceBoxH, sentenceBoxR);
  ctx.lineTo(sentenceBoxX + sentenceBoxR, sentenceBoxY + sentenceBoxH);
  ctx.arcTo(sentenceBoxX, sentenceBoxY + sentenceBoxH, sentenceBoxX, sentenceBoxY + sentenceBoxH - sentenceBoxR, sentenceBoxR);
  ctx.lineTo(sentenceBoxX, sentenceBoxY + sentenceBoxR);
  ctx.arcTo(sentenceBoxX, sentenceBoxY, sentenceBoxX + sentenceBoxR, sentenceBoxY, sentenceBoxR);
  ctx.closePath();
  ctx.clip();

  ctx.fillStyle = "#111";
  for(let i=0;i<continueParticles.length;i++){
    const p = continueParticles[i];
    ctx.beginPath();
    ctx.arc(p.x, p.y, CONTINUE_PARTICLE_RADIUS, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

  center.r=DOT_R*(1+0.6*Math.min(1,ease/dotPhaseEnd));
  center.alpha=1;
  let lineT=0;
  if(ease>dotPhaseEnd) lineT=Math.max(0,Math.min(1,(ease-dotPhaseEnd)/(1-dotPhaseEnd)));
  fourthPillLine.x1=center.x;
  fourthPillLine.y1=center.y-targetHalfLen*lineT;
  fourthPillLine.x2=center.x;
  fourthPillLine.y2=center.y+targetHalfLen*lineT;
  fourthPillLine.t=lineT;
  topDot.alpha=1;
  bottomDot.alpha=1;
  if(t>=1){
    fourthPillMergeAnim=false;
    mergeFadeHelper(topDot,bottomDot,center,()=>{
      fourthPillDotsVisible=false;
      topDot.alpha=0;
      bottomDot.alpha=0;

function mergeFadeHelper(topDot, bottomDot, center, onDone){

function render(timestamp){
  if(typeof timestamp==="number"){
    updatePage2Animations(timestamp);
    updateCornerMerge(timestamp);
    updateLeftMerge(timestamp);
    updateCenterMerge(timestamp);
    updateBlankMerge(timestamp);
    updateThirdPillMerge(timestamp);
    updateFourthPillMerge(timestamp);
    updateCornerReverse(timestamp);
    updateCornerSlideOut(timestamp);
    updateLeftReverse(timestamp);
    updateLeftSlideOut(timestamp);
    updateCenterReverse(timestamp);
    updateCenterSlideOut(timestamp);
    updateBlankReverse(timestamp);
    updateBlankSlideOut(timestamp);
    updateThirdPillReverse(timestamp);
    updateThirdPillSlideOut(timestamp);
    updateFourthPillReverse(timestamp);
    updateFourthPillSlideOut(timestamp);

    if(!lastTimestamp) lastTimestamp=timestamp;
    const dt=timestamp-lastTimestamp;
    lastTimestamp=timestamp;

    sentenceLineProgress+=(sentenceLineTargetProgress-sentenceLineProgress)*0.25;
    if(sentenceLineResolveAnim){
      resolveHeadT=Math.min(1,resolveHeadT+dt*RESOLVE_SPEED);
      if(resolveHeadT>=1){
        sentenceLineResolveAnim=false;
        sentenceLineResolved=true;
      }
    }

    updateBlob(dt);
    updateTextStrokes(dt);

    if(blobRevealAnim){
      blobRevealT = Math.min(1, (timestamp - blobRevealStartTime) / BLOB_REVEAL_DURATION);
      if(blobRevealT >= 1){
        blobRevealAnim = false;
        blobRevealT = 1;
      }
    }

    if(cornerLineLoading&&!cornerLineLoaded){
      cornerLineLoad+=dt/cornerLineLoadDuration;
      if(cornerLineLoad>=1){
        cornerLineLoad=1;
        cornerLineLoaded=true;
        cornerLineLoading=false;
        sentenceLineActive=true;
        sentenceLineResolved=false;
        sentenceLineResolveAnim=false;
        sentenceLineProgress=0;
        sentenceLineTargetProgress=0;
        beltHighlightRow=0;
        beltHighlightActive=true;
        beltHighlightFade=0;
        beltHighlightFadeIn=true;
        beltHighlightFadeOut=false;
        beltHighlightStartTime=timestamp||performance.now();
        if(!leftSequenceStarted){
          leftSequenceStarted=true;
          leftArrowVisible=true;
          leftArrowAnim=true;
          leftArrowStartTime=timestamp||performance.now();
          buildLeftDotsTargets();
        }
      }
    }
    if(leftLineLoading&&!leftLineLoaded){
      leftLineLoad+=dt/leftLineLoadDuration;
      if(leftLineLoad>=1){
        leftLineLoad=1;
        leftLineLoaded=true;
        leftLineLoading=false;
        beltHighlightFadeOut=true;
        beltHighlightFadeIn=false;
        beltHighlightFadeOutStartTime=timestamp||performance.now();
        buildResolvePath();
        sentenceLineResolveAnim=true;
        setTimeout(()=>{
          buildCenterDotsTargets();
          centerDotsVisible=true;
          centerDotsAnim=true;
          centerDotsStartTime=performance.now();
          render();
        },2200);
      }
    }
    if(centerLineLoading&&!centerLineLoaded){
      centerLineLoad+=dt/centerLineLoadDuration;
      if(centerLineLoad>=1){
        centerLineLoad=1;
        centerLineLoaded=true;
        centerLineLoading=false;
        beltHighlightRow=1;
        beltHighlightActive=true;
        beltHighlightFade=0;
        beltHighlightFadeIn=true;
        beltHighlightFadeOut=false;
        beltHighlightStartTime=timestamp||performance.now();
        rightArrowVisible=true;
        rightArrowAnim=true;
        rightArrowStartTime=timestamp||performance.now();
        buildBlankDotsTargets();
        blankDotsVisible=true;
        blankDotsAnim=true;
        blankDotsStartTime=timestamp||performance.now();
      }
    }
    if(blankLineLoading&&!blankLineLoaded){
      blankLineLoad+=dt/blankLineLoadDuration;
      if(blankLineLoad>=1){
        blankLineLoad=1;
        blankLineLoaded=true;
        blankLineLoading=false;
        blobResolveAnim=true;
        blobResolveT=0;
        beltHighlightFadeOut=true;
        beltHighlightFadeIn=false;
        beltHighlightFadeOutStartTime=timestamp||performance.now();
      }
    }

    if(thirdPillLineLoading&&!thirdPillLineLoaded){
      thirdPillLineLoad+=dt/thirdPillLineLoadDuration;
      if(thirdPillLineLoad>=1){
        thirdPillLineLoad=1;
        thirdPillLineLoaded=true;
        thirdPillLineLoading=false;
        beltHighlightRow=2;
        beltHighlightActive=true;
        beltHighlightFade=0;
        beltHighlightFadeIn=true;
        beltHighlightFadeOut=false;
        beltHighlightStartTime=timestamp||performance.now();
        buildFourthPillDotsTargets();
        fourthPillDotsVisible=true;
        fourthPillDotsAnim=true;
        fourthPillDotsStartTime=timestamp||performance.now();
      }
    }
    if(fourthPillLineLoading&&!fourthPillLineLoaded){
      fourthPillLineLoad+=dt/fourthPillLineLoadDuration;
      if(fourthPillLineLoad>=1){
        fourthPillLineLoad=1;
        fourthPillLineLoaded=true;
        fourthPillLineLoading=false;
        startTextStrokesResolve();
      }
    }

    if(blobResolved&&!pillsResolveStarted){
      pillsResolveStarted=true;
      startCenterReverse(timestamp);
      startBlankReverse(timestamp);
    }
    if(sentenceLineResolved&&!hoverReverseStarted){
      hoverReverseStarted=true;
      startCornerReverse(timestamp);
      startLeftReverse(timestamp);
    }

    if(beltHighlightActive){
      const now=timestamp||performance.now();
      if(beltHighlightFadeIn){
        const elapsed=now-beltHighlightStartTime, t=Math.min(1,elapsed/beltHighlightFadeDuration);
        beltHighlightFade=t*t*(3-2*t);
        if(t>=1) beltHighlightFadeIn=false;
      }
      if(beltHighlightFadeOut){
        const elapsed=now-beltHighlightFadeOutStartTime, t=Math.min(1,elapsed/beltHighlightFadeOutDuration), ease=t*t*(3-2*t);
        beltHighlightFade=1-ease;
        if(t>=1){
          beltHighlightFadeOut=false;
          beltHighlightActive=false;
          beltHighlightFade=0;
        }
      }
    }
  }

  ctx.clearRect(0,0,W,H);

  if(!playingTransition&&page1.classList.contains("active")&&strokePts.length>1){
    ctx.strokeStyle="#F71F08";
    ctx.lineWidth=LINE_W;
    ctx.lineCap="round";
    ctx.lineJoin="round";
    ctx.beginPath();
    ctx.moveTo(strokePts[0].x,strokePts[0].y);
    for(let i=1;i<strokePts.length;i++) ctx.lineTo(strokePts[i].x,strokePts[i].y);
    if(drawing&&strokePts.length) ctx.lineTo(pointer.x,pointer.y);
    ctx.stroke();
  }

  drawDots();
  drawCornerDots(); drawCornerLine(); drawCornerLineLoader(); drawCornerNumber(timestamp||performance.now());
  drawCenterDots(); drawCenterLine(); drawCenterLineLoader(); drawCenterNumber(timestamp||performance.now()); drawRightArrow(timestamp||performance.now());
  drawThirdPillDots(); drawThirdPillLine(); drawThirdPillLineLoader(); drawThirdPillNumber(timestamp||performance.now());
  drawFourthPillDots(); drawFourthPillLine(); drawFourthPillLineLoader();
  drawBlankDots(); drawBlankLine(); drawBlankLineLoader();
  drawLeftDots(); drawLeftLine(); drawLeftLineLoader(); drawLeftArrow(timestamp||performance.now());
  drawSentenceShape();
  drawBlob();
  drawTextStrokes();

  if(blobActive && page2.classList.contains("active")){
    ctx.save();
    ctx.strokeStyle = "rgba(0,0,0,0.92)";
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(sentenceBoxX + sentenceBoxR, sentenceBoxY);
    ctx.lineTo(sentenceBoxX + sentenceBoxW - sentenceBoxR, sentenceBoxY);
    ctx.arcTo(sentenceBoxX + sentenceBoxW, sentenceBoxY, sentenceBoxX + sentenceBoxW, sentenceBoxY + sentenceBoxR, sentenceBoxR);
    ctx.lineTo(sentenceBoxX + sentenceBoxW, sentenceBoxY + sentenceBoxH - sentenceBoxR);
    ctx.arcTo(sentenceBoxX + sentenceBoxW, sentenceBoxY + sentenceBoxH, sentenceBoxX + sentenceBoxW - sentenceBoxR, sentenceBoxY + sentenceBoxH, sentenceBoxR);
    ctx.lineTo(sentenceBoxX + sentenceBoxR, sentenceBoxY + sentenceBoxH);
    ctx.arcTo(sentenceBoxX, sentenceBoxY + sentenceBoxH, sentenceBoxX, sentenceBoxY + sentenceBoxH - sentenceBoxR, sentenceBoxR);
    ctx.lineTo(sentenceBoxX, sentenceBoxY + sentenceBoxR);
    ctx.arcTo(sentenceBoxX, sentenceBoxY, sentenceBoxX + sentenceBoxR, sentenceBoxY, sentenceBoxR);
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
  }

  if(heroCircleVisible) drawHeroCircle();
  if(page2.classList.contains("active")) requestAnimationFrame(render);
}

function playTransition(){
  if(playingTransition) return;
  playingTransition=true;
  showIntroWords(false);
  drawing=false;
  showDotLabels=false;
  clearHintTimer();
  hideHint();

  const startDots=dots.map(d=>({x:d.x,y:d.y,label:d.label})), targets=buildLineTargets();
  let idx=0;

  function drawFrame(){
    if(!playingTransition) return;
    const t=(FRAME_COUNT<=1)?1:(idx/(FRAME_COUNT-1));
    ctx.clearRect(0,0,W,H);
    const img=frames[idx];
    if(img&&img.complete) ctx.drawImage(img,0,0,W,H);

    for(let i=0;i<dots.length;i++){
      dots[i].x=lerp(startDots[i].x,targets[i].x,t);
      dots[i].y=lerp(startDots[i].y,targets[i].y,t);
    }

    drawDots();
    idx++;

    if(idx<FRAME_COUNT){
      setTimeout(drawFrame,FRAME_DELAY);
    } else {
      for(let i=0;i<dots.length;i++){
        dots[i].x=targets[i].x;
        dots[i].y=targets[i].y;
      }
      playingTransition=false;
      updateHeroCircle();
      goTo(2);
      startCircleAndDotsAnimationAfterDelay();
      render();
    }
  }

  drawFrame();
}

enterBtn.addEventListener("click",()=>{
  if(!BYPASS_PUZZLE&&!completed) return;
  if(framesLoaded>0){
    playTransition();
    return;
  }

  playingTransition=true;
  showIntroWords(false);
  drawing=false;
  showDotLabels=false;
  clearHintTimer();
  hideHint();

  const startDots=dots.map(d=>({x:d.x,y:d.y,label:d.label})), targets=buildLineTargets();
  let idx=0;

  function step(){
    const t=(FRAME_COUNT<=1)?1:(idx/(FRAME_COUNT-1));
    ctx.clearRect(0,0,W,H);
    for(let i=0;i<dots.length;i++){
      dots[i].x=lerp(startDots[i].x,targets[i].x,t);
      dots[i].y=lerp(startDots[i].y,targets[i].y,t);
    }
    drawDots();
    idx++;
    if(idx<FRAME_COUNT){
      setTimeout(step,FRAME_DELAY);
    } else {
      playingTransition=false;
      updateHeroCircle();
      goTo(2);
      startCircleAndDotsAnimationAfterDelay();
      render();
    }
  }

  step();
});

backBtn.addEventListener("click",(e)=>{
  e.preventDefault();
  playingTransition=false;
  goTo(1);
  showIntroWords(true);
  stageEl.style.background=STAGE_BG_PAGE1;

  resetAllPage2State();
  showDotLabels=true;
  setDotsToHome();
  completed=BYPASS_PUZZLE;
  hasStartedPuzzle=false;
  reset();
  startHintTimer();
  render();
});

/* init */
resize();
window.addEventListener("resize",resize);
startHintTimer();

})();
</script>
</body>
</html>
