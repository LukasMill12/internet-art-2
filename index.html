<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Intent — draw</title>

<style>
@font-face{
  font-family:"Supreme";
  src:url("Supreme-Regular.otf") format("opentype");
  font-weight:400;
  font-style:normal;
}

@font-face{
  font-family:"Supreme";
  src:url("Supreme-Bold.otf") format("opentype");
  font-weight:700;
  font-style:normal;
}

:root{
  --bg:#d9d7d0;
  --fg:#111;
  --muted: rgba(0,0,0,.55);
}

html,body{
  margin:0;
  height:100%;
  width:100%;
  overflow:hidden;
  overscroll-behavior:none;
  background:var(--bg);
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
}

body{
  position:fixed;
  inset:0;
}

.app{
  position:fixed;
  inset:0;
  overflow:hidden;
}

.stage{
  position:fixed;
  inset:0;
  z-index:0;
  background: url("Background.png") center/cover no-repeat;
}

canvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  display:block;
  z-index:1;
}

.page{
  position:absolute;
  inset:0;
  opacity:0;
  transform:translateY(12px);
  pointer-events:none;
  transition: opacity .45s ease, transform .45s ease;
  z-index:2;
}

.page.active{
  opacity:1;
  transform:translateY(0);
  pointer-events:none;
}

.introManual{
  position:absolute;
  inset:0;
  z-index:3;
  pointer-events:none;
  transition:opacity .3s ease;
}

.introWord{
  position:absolute;
  transform:translate(-50%, -50%);
  font-family:"Supreme", system-ui, sans-serif;
  font-size:20px;
  letter-spacing:-0.01em;
  text-transform:uppercase;
  color:var(--fg);
  white-space:nowrap;
}

.hint{
  position:absolute;
  left:50%;
  bottom:15vh;
  transform:translateX(-50%);
  z-index:3;
  pointer-events:none;
  font-family:"Supreme", system-ui, sans-serif;
  font-size:14px;
  letter-spacing:0.01em;
  text-transform:uppercase;
  color:rgba(0,0,0,0.48);
  opacity:0;
  transition:opacity .45s ease;
  white-space:nowrap;
}

.hint.visible{
  opacity:1;
}

.enter{
  position:absolute;
  right:6vw;
  bottom:8vh;
  z-index:4;
  font-size: clamp(34px,3.2vw,52px);
  line-height:1;
  color:rgba(0,0,0,.18);
  opacity:.25;
  transition:all .25s ease;
  cursor:default;
  user-select:none;
  pointer-events:auto;
}

.enter.ready{
  color:rgba(0,0,0,.85);
  opacity:1;
  cursor:pointer;
  transform:translateY(-2px);
}

.p2{
  padding:9vh 9vw;
  color:var(--fg);
  pointer-events:auto;
}

.p2 h1{
  margin:0;
  font-size: clamp(50px,6vw,80px);
}

.p2 p{
  margin-top:18px;
  max-width:700px;
  color:var(--muted);
  font-size:18px;
  line-height:1.6;
}

.back{
  display:inline-block;
  margin-top:30px;
  text-decoration:none;
  color:rgba(0,0,0,.75);
  border-bottom:1px solid rgba(0,0,0,.3);
  padding-bottom:3px;
  pointer-events:auto;
}
</style>
</head>

<body>
<div class="app">

  <div class="stage" id="stage">
    <canvas id="c"></canvas>
  </div>

  <section class="page active" id="page1">
    <div class="introManual" id="introManual"></div>
    <div class="hint" id="hintText">Connect the dots to reveal a word</div>
    <div class="enter" id="enterBtn" aria-label="next">→</div>
  </section>

  <section class="page" id="page2">
  <div class="p2">
    <a href="#" class="back" id="backBtn">← back</a>
  </div>
</section>



</div>

<script>
(() => {

/* DOM refs */
const page1 = document.getElementById("page1");
const page2 = document.getElementById("page2");
const enterBtn = document.getElementById("enterBtn");
const backBtn = document.getElementById("backBtn");
const introLayer = document.getElementById("introManual");
const hintText = document.getElementById("hintText");
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const stageEl = document.getElementById("stage");

const STAGE_BG_PAGE1 = 'url("Background.png") center/cover no-repeat';

/* page switch */
function goTo(p){
  if(p===1){
    page1.classList.add("active");
    page2.classList.remove("active");
    canvas.style.pointerEvents = "auto";
    stageEl.style.background = STAGE_BG_PAGE1;
    startHintTimer();
  } else {
    page1.classList.remove("active");
    page2.classList.add("active");
    canvas.style.pointerEvents = "auto";
    stageEl.style.background = "#fff";
    clearHintTimer();
    hideHint();
  }
}

/* intro words */
const WORD_Y = 0.26;
const WORDS = [
  { text:"LUKAS MILIAUSKIS", x:0.068 },
  { text:"I DESIGN", x:0.21 },
  { text:"VISUAL SYSTEMS", x:0.355 },
  { text:"THIS WEBSITE", x:0.50 },
  { text:"REFLECTS", x:0.645 },
  { text:"HOW I THINK", x:0.79 },
  { text:"AND WORK", x:0.935 },
];

function renderIntroWords(){
  introLayer.innerHTML = "";
  for(const w of WORDS){
    const el = document.createElement("div");
    el.className = "introWord";
    el.textContent = w.text;
    el.style.left = (w.x * 100) + "vw";
    el.style.top = (WORD_Y * 100) + "vh";
    introLayer.appendChild(el);
  }
}
function showIntroWords(show){
  introLayer.style.transition = "none";
  introLayer.style.opacity = show ? "1" : "0";
}
renderIntroWords();
showIntroWords(true);

/* ===========================
HINT
=========================== */
let hintTimer = null;
let hasStartedPuzzle = false;
const HINT_DELAY = 5000;

function showHint(){
  if(!hasStartedPuzzle && page1.classList.contains("active")){
    hintText.classList.add("visible");
  }
}
function hideHint(){ hintText.classList.remove("visible"); }
function clearHintTimer(){
  if(hintTimer){ clearTimeout(hintTimer); hintTimer = null; }
}
function startHintTimer(){
  clearHintTimer();
  hideHint();
  if(hasStartedPuzzle) return;
  hintTimer = setTimeout(showHint, HINT_DELAY);
}
function markPuzzleStarted(){
  if(hasStartedPuzzle) return;
  hasStartedPuzzle = true;
  clearHintTimer();
  hideHint();
}

/* ===========================
COMMON CANVAS STATE
=========================== */
let W, H, dpr;
let drawing = false;
let strokePts = [];
let pointer = {x:0, y:0};

let dots = [];
let dotsHome = [];
let nextIdx = 0;
let completed = false;

let showDotLabels = true;

const DOT_R = 7.5;
const CLICK_HIT_R = 18;
const DRAG_HIT_R = 9;
const LINE_W = 2.2;

let pressStart = { x:0, y:0 };
let movedSinceDown = false;
const CLICK_MOVE_TOL = 8;

/* ===========================
HERO CIRCLE + SPHERICAL BELT
=========================== */
let heroCircleVisible = false;
let heroCircle = { x:0, y:0, r:0 };

let circleAnim = false;
let circleStartY = 0;
let circleEndY = 0;
let circleStartTime = 0;
const circleDuration = 1000;

/* belt activation flag */
let beltActive = false;

const NOISE_SIZE = 128;
const NOISE_ALPHA = 0.94;
const noiseCanvas = document.createElement("canvas");
const noiseCtx = noiseCanvas.getContext("2d");
noiseCanvas.width = NOISE_SIZE;
noiseCanvas.height = NOISE_SIZE;

function generateNoiseTexture(){
  const imgData = noiseCtx.createImageData(NOISE_SIZE, NOISE_SIZE);
  const data = imgData.data;
  const baseR = 0xF7, baseG = 0x1F, baseB = 0x08;
  for(let i=0;i<data.length;i+=4){
    const jitter = (Math.random() - 0.5) * 40;
    const r = Math.max(0, Math.min(255, baseR + jitter));
    const g = Math.max(0, Math.min(255, baseG + jitter));
    const b = Math.max(0, Math.min(255, baseB + jitter));
    data[i] = r;
    data[i+1] = g;
    data[i+2] = b;
    data[i+3] = 255;
  }
  noiseCtx.putImageData(imgData, 0, 0);
  noiseCtx.globalAlpha = 0.6;
  noiseCtx.filter = "blur(0.4px)";
  noiseCtx.drawImage(noiseCanvas, 0, 0);
  noiseCtx.filter = "none";
  noiseCtx.globalAlpha = 1;
}
generateNoiseTexture();

let roughSeed = 12345;
function seededRandom(){
  roughSeed ^= roughSeed << 13;
  roughSeed ^= roughSeed >> 17;
  roughSeed ^= roughSeed << 5;
  return (roughSeed >>> 0) / 0xFFFFFFFF;
}
function drawRoughCircle(x, y, r, jitter){
  const steps = 256;
  const angleStep = (Math.PI * 2) / steps;
  ctx.beginPath();
  for(let i=0;i<=steps;i++){
    const a = i * angleStep;
    const jr = (seededRandom() * 2 - 1) * jitter;
    const rr = r + jr;
    const px = x + Math.cos(a) * rr;
    const py = y + Math.sin(a) * rr;
    if(i===0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.closePath();
}
function drawHeroNoise(){
  const {x,y,r} = heroCircle;
  const pattern = ctx.createPattern(noiseCanvas,"repeat");
  if(!pattern) return;
  ctx.globalAlpha = NOISE_ALPHA;
  ctx.fillStyle = pattern;
  ctx.fillRect(x-r, y-r, r*2, r*2);
  ctx.globalAlpha = 1;
}
function updateHeroCircle(){
  heroCircle.x = W * 0.50;
  heroCircle.r = W * 0.15;
  heroCircle.y = H * 0.00;
}

/* continuous belt text */
const BELT_TEXT_BASE =
"Intent is shaped by language, motion, structure, balance, continuity, attention, error, ambiguity, and chance. ";
const BELT_TEXT = BELT_TEXT_BASE.repeat(10);
const BELT_CHAR_COUNT = BELT_TEXT.length;

let beltOffset = 0;
let beltTargetOffset = 0;
let beltY = 0;
let beltTargetY = 0;

let lastMouseX = null;

const BELT_FONT_REL = 0.09;
const BELT_MAX_Y = 0.65;
const BELT_DEPTH_OFFSET = 0.04;

/* draw one belt row at given bandY (px from circle center) */
function drawSingleBelt(bandY){
  const {x:cx, y:cy, r} = heroCircle;
  const fontSize = r * BELT_FONT_REL;
  ctx.font = `bold ${fontSize}px "Supreme", system-ui, sans-serif`;
  ctx.textBaseline = "middle";
  ctx.textAlign = "center";

  const totalArc = Math.PI * 1.6;
  const startAngle = -totalArc / 2;

  const charsOnArc = Math.floor(totalArc * r / (fontSize * 0.6));
  const charAngleStep = totalArc / charsOnArc;

  const latRatio = bandY / r;
  const clampedLatRatio = Math.max(-0.999, Math.min(0.999, latRatio));
  const theta = Math.asin(clampedLatRatio);
  const latCos = Math.cos(theta);

  const radiusAtLat = r * latCos + r * BELT_DEPTH_OFFSET;

  const wholeOffset = Math.floor(beltOffset);
  const fracOffset = beltOffset - wholeOffset;

  for(let i=0; i<=charsOnArc; i++){
    const shiftedI = i - fracOffset;

    const angle = startAngle + shiftedI * charAngleStep;
    const depth = Math.cos(angle);
    if(depth <= 0) continue;

    const xOnCircle = Math.sin(angle) * radiusAtLat;
    const yOnCircle = bandY;

    const screenX = cx + xOnCircle;
    const screenY = cy + yOnCircle;

    const charIndex = ((wholeOffset + i) % BELT_CHAR_COUNT + BELT_CHAR_COUNT) % BELT_CHAR_COUNT;
    const ch = BELT_TEXT[charIndex];

    const alpha = 0.45 + depth * 0.45;

    ctx.save();
    ctx.translate(screenX, screenY);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = "#111";
    ctx.fillText(ch, 0, 0);
    ctx.restore();
  }

  ctx.globalAlpha = 1;
}

/* three-row text belt */
function drawTextBelt(){
  if(!heroCircleVisible || !page2.classList.contains("active") || !beltActive) return;

  beltOffset += (beltTargetOffset - beltOffset) * 0.85;
  beltY = beltTargetY;

  const {r} = heroCircle;
  const maxBandY = r * BELT_MAX_Y;

  const centerBandY = Math.max(-maxBandY, Math.min(maxBandY, beltY));

  const rowGap = r * 0.12;
  const bandY1 = centerBandY - rowGap;
  const bandY2 = centerBandY;
  const bandY3 = centerBandY + rowGap;

  drawSingleBelt(bandY1);
  drawSingleBelt(bandY2);
  drawSingleBelt(bandY3);
}

function drawHeroCircle(){
  if(!heroCircleVisible) return;

  roughSeed = 12345;
  const jitter = heroCircle.r * 0.004;

  drawRoughCircle(heroCircle.x, heroCircle.y, heroCircle.r, jitter);
  ctx.fillStyle = "#F71F08";
  ctx.fill();

  ctx.save();
  drawRoughCircle(heroCircle.x, heroCircle.y, heroCircle.r, jitter);
  ctx.clip();
  drawHeroNoise();
  ctx.restore();

  drawTextBelt();
}

/* mouse → beltOffset / beltY */
window.addEventListener("mousemove",(e)=>{
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width;

  if(page2.classList.contains("active")){
    if(lastMouseX === null) lastMouseX = x;
    const dx = x - lastMouseX;
    lastMouseX = x;

    const charsPerScreen = BELT_CHAR_COUNT * 0.12;
    beltTargetOffset += dx * charsPerScreen * -1;

    if(beltTargetOffset > 1e6) beltTargetOffset -= 1e6;
    if(beltTargetOffset < -1e6) beltTargetOffset += 1e6;

    const yPx = e.clientY - rect.top;
    const rawOffsetY = yPx - heroCircle.y;
    const maxBandY = heroCircle.r * BELT_MAX_Y;
    beltTargetY = Math.max(-maxBandY, Math.min(maxBandY, rawOffsetY));

    render();
  } else {
    lastMouseX = null;
  }
});

/* ===========================
LAYOUT + DOT PUZZLE
=========================== */
function resize(){
  const rect = canvas.getBoundingClientRect();
  dpr = Math.max(1, Math.floor(window.devicePixelRatio || 1));
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  W = rect.width;
  H = rect.height;

  buildDots();
  setDotsToHome();
  updateHeroCircle();
  reset();
  render();
}

function reset(){
  drawing = false;
  strokePts = [];
  nextIdx = completed ? dots.length : 0;
  movedSinceDown = false;
  if(completed) enterBtn.classList.add("ready");
  else enterBtn.classList.remove("ready");
}

function buildDots(){
  const P = [
    [0.06,0.18],[0.06,0.30],[0.06,0.44],[0.06,0.58],
    [0.22,0.58],[0.20,0.18],[0.26,0.58],[0.26,0.18],
    [0.36,0.18],[0.42,0.18],[0.39,0.18],[0.39,0.58],
    [0.54,0.18],[0.48,0.18],[0.48,0.36],[0.52,0.36],[0.48,0.58],[0.54,0.58],
    [0.70,0.58],[0.68,0.18],[0.74,0.58],[0.74,0.18],
    [0.84,0.18],[0.90,0.18],[0.87,0.18],[0.87,0.58],
  ];

  const bandTop = H * 0.56;
  const bandH = H * 0.34;
  const left = W * 0.10;
  const bandW = W * 0.80;

  dotsHome = P.map((p,i)=>({
    x: left + p[0] * bandW,
    y: bandTop + p[1] * bandH,
    label: String(i+1).padStart(2,"0")
  }));
}
function setDotsToHome(){
  dots = dotsHome.map(d => ({...d}));
}

function setPointer(e){
  const r = canvas.getBoundingClientRect();
  const src = (e.touches && e.touches[0]) ? e.touches[0] : e;
  pointer.x = src.clientX - r.left;
  pointer.y = src.clientY - r.top;
}
function dist2(ax,ay,bx,by){
  const dx = ax - bx, dy = ay - by;
  return dx*dx + dy*dy;
}
function appendPoint(x,y){
  const last = strokePts[strokePts.length-1];
  if(!last){
    strokePts.push({x,y});
    return;
  }
  const dx = x - last.x, dy = y - last.y;
  if(dx*dx + dy*dy > 0.25) strokePts.push({x,y});
}
function completeIfDone(){
  if(nextIdx >= dots.length){
    completed = true;
    enterBtn.classList.add("ready");
    drawing = false;
  }
}
function hitCurrentDotClick(){
  const d = dots[nextIdx];
  if(!d) return false;

  if(dist2(pointer.x, pointer.y, d.x, d.y) <= CLICK_HIT_R * CLICK_HIT_R){
    appendPoint(d.x, d.y);
    nextIdx++;
    completeIfDone();
    markPuzzleStarted();
    return true;
  }
  return false;
}
function hitCurrentDotDrag(){
  const d = dots[nextIdx];
  if(!d) return false;

  if(dist2(pointer.x, pointer.y, d.x, d.y) <= DRAG_HIT_R * DRAG_HIT_R){
    appendPoint(pointer.x, pointer.y);
    nextIdx++;
    completeIfDone();
    markPuzzleStarted();
    return true;
  }
  return false;
}
function maybeAddFreePoint(){
  if(!drawing || completed) return;
  const last = strokePts[strokePts.length-1];
  if(!last){
    strokePts.push({x:pointer.x, y:pointer.y});
    return;
  }
  const dx = pointer.x - last.x, dy = pointer.y - last.y;
  if(dx*dx + dy*dy >= 2.5 * 2.5){
    strokePts.push({x:pointer.x, y:pointer.y});
  }
}

let playingTransition = false;

function onDown(e){
  if(playingTransition || !page1.classList.contains("active")) return;
  setPointer(e);
  pressStart.x = pointer.x;
  pressStart.y = pointer.y;
  movedSinceDown = false;
  drawing = true;

  if(nextIdx === 0){
    const d = dots[0];
    if(dist2(pointer.x, pointer.y, d.x, d.y) <= CLICK_HIT_R * CLICK_HIT_R){
      appendPoint(d.x, d.y);
      nextIdx = 1;
      completeIfDone();
      markPuzzleStarted();
      render();
      return;
    }
    drawing = false;
  } else {
    appendPoint(pointer.x, pointer.y);
    if(strokePts.length > 0) markPuzzleStarted();
  }
  render();
}

function onMove(e){
  if(!drawing || playingTransition || !page1.classList.contains("active")) return;
  setPointer(e);

  const dx0 = pointer.x - pressStart.x;
  const dy0 = pointer.y - pressStart.y;
  if(dx0*dx0 + dy0*dy0 > CLICK_MOVE_TOL * CLICK_MOVE_TOL) movedSinceDown = true;

  if(movedSinceDown){
    maybeAddFreePoint();
    hitCurrentDotDrag();
    if(strokePts.length > 0) markPuzzleStarted();
  } else {
    maybeAddFreePoint();
  }
  render();
}

function onUp(e){
  if(!page1.classList.contains("active")){
    drawing = false;
    return;
  }

  setPointer(e);

  if(drawing){
    if(movedSinceDown){
      appendPoint(pointer.x, pointer.y);
      hitCurrentDotDrag();
    } else {
      hitCurrentDotClick();
    }
  }

  drawing = false;
  render();
}

canvas.addEventListener("mousedown", onDown);
window.addEventListener("mousemove", onMove);
window.addEventListener("mouseup", onUp);
canvas.addEventListener("touchstart", e => { e.preventDefault(); onDown(e); }, {passive:false});
canvas.addEventListener("touchmove", e => { e.preventDefault(); onMove(e); }, {passive:false});
window.addEventListener("touchend", e => {
  if(!e.changedTouches || !e.changedTouches.length) return;
  const t = e.changedTouches[0];
  onUp({clientX:t.clientX, clientY:t.clientY});
}, {passive:false});

/* dots rendering */
function drawDots(){
  for(const d of dots){
    ctx.fillStyle = "rgba(0,0,0,0.92)";
    ctx.beginPath();
    ctx.arc(d.x, d.y, DOT_R, 0, Math.PI*2);
    ctx.fill();

    if(showDotLabels){
      ctx.fillStyle = "rgba(0,0,0,0.55)";
      ctx.font = "13px system-ui";
      ctx.textAlign = "center";
      ctx.textBaseline = "bottom";
      ctx.fillText(d.label, d.x - 18, d.y - 10);
    }
  }
}

/* master render */
function render(timestamp){
  ctx.clearRect(0,0,W,H);

  if(!playingTransition && page1.classList.contains("active") && strokePts.length > 1){
    ctx.strokeStyle = "#F71F08";
    ctx.lineWidth = LINE_W;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.beginPath();
    ctx.moveTo(strokePts[0].x, strokePts[0].y);
    for(let i=1;i<strokePts.length;i++){
      ctx.lineTo(strokePts[i].x, strokePts[i].y);
    }

    if(drawing && strokePts.length){
      ctx.lineTo(pointer.x, pointer.y);
    }

    ctx.stroke();
  }

  drawDots();

  if(heroCircleVisible){
    drawHeroCircle();
  }

  if(circleAnim && typeof timestamp === "number"){
    const t = Math.min(1, (timestamp - circleStartTime) / circleDuration);
    const ease = t * t * (3 - 2 * t);
    heroCircle.y = circleStartY + (circleEndY - circleStartY) * ease;
    if(t < 1){
      requestAnimationFrame(render);
    } else {
      circleAnim = false;
      beltActive = true;
      render();
    }
  }
}

/* ===========================
TRANSITION
=========================== */
const FRAME_COUNT = 35;
const FRAME_DELAY = 100;
const frames = [];
let framesLoaded = 0;

function lerp(a,b,t){ return a + (b-a) * t; }
function frameSrc(i){ return `Animation_${i}.png`; }

for(let i=1;i<=FRAME_COUNT;i++){
  const img = new Image();
  img.src = frameSrc(i);
  img.onload = () => { framesLoaded++; };
  frames.push(img);
}

function buildLineTargets(){
  const n = dots.length;
  const yLine = H * 0.78;
  const x0 = W * 0.12, x1 = W * 0.88;
  const targets = new Array(n);
  for(let i=0;i<n;i++){
    const t = (n===1) ? 0.5 : (i/(n-1));
    targets[i] = {x:lerp(x0,x1,t), y:yLine};
  }
  return targets;
}

function startCircleAnimationAfterDelay(){
  circleStartY = H * 0.00;
  circleEndY = H * 0.45;
  heroCircle.y = circleStartY;
  heroCircleVisible = true;

  beltOffset = beltTargetOffset = 0;
  beltY = beltTargetY = 0;
  lastMouseX = null;
  beltActive = false;

  setTimeout(()=>{
    circleAnim = true;
    circleStartTime = performance.now();
    requestAnimationFrame(render);
  },1200);
}

function playTransition(){
  if(playingTransition) return;
  playingTransition = true;

  showIntroWords(false);
  drawing = false;
  showDotLabels = false;
  clearHintTimer();
  hideHint();

  const startDots = dots.map(d => ({x:d.x, y:d.y, label:d.label}));
  const targets = buildLineTargets();
  let idx = 0;

  function drawFrame(){
    if(!playingTransition) return;
    const t = (FRAME_COUNT <= 1) ? 1 : (idx / (FRAME_COUNT - 1));
    ctx.clearRect(0,0,W,H);
    const img = frames[idx];
    if(img && img.complete) ctx.drawImage(img,0,0,W,H);

    for(let i=0;i<dots.length;i++){
      dots[i].x = lerp(startDots[i].x, targets[i].x, t);
      dots[i].y = lerp(startDots[i].y, targets[i].y, t);
    }

    drawDots();
    idx++;

    if(idx < FRAME_COUNT){
      setTimeout(drawFrame, FRAME_DELAY);
    } else {
      for(let i=0;i<dots.length;i++){
        dots[i].x = targets[i].x;
        dots[i].y = targets[i].y;
      }
      playingTransition = false;
      updateHeroCircle();
      goTo(2);
      startCircleAnimationAfterDelay();
      render();
    }
  }

  drawFrame();
}

enterBtn.addEventListener("click",()=>{
  if(!completed) return;
  if(framesLoaded > 0){
    playTransition();
    return;
  }

  playingTransition = true;
  showIntroWords(false);
  drawing = false;
  showDotLabels = false;
  clearHintTimer();
  hideHint();

  const startDots = dots.map(d => ({x:d.x, y:d.y, label:d.label}));
  const targets = buildLineTargets();
  let idx = 0;

  function step(){
    const t = (FRAME_COUNT <= 1) ? 1 : (idx / (FRAME_COUNT - 1));
    ctx.clearRect(0,0,W,H);

    for(let i=0;i<dots.length;i++){
      dots[i].x = lerp(startDots[i].x, targets[i].x, t);
      dots[i].y = lerp(startDots[i].y, targets[i].y, t);
    }

    drawDots();
    idx++;

    if(idx < FRAME_COUNT){
      setTimeout(step, FRAME_DELAY);
    } else {
      playingTransition = false;
      updateHeroCircle();
      goTo(2);
      startCircleAnimationAfterDelay();
      render();
    }
  }

  step();
});

backBtn.addEventListener("click",(e)=>{
  e.preventDefault();
  playingTransition = false;

  goTo(1);
  showIntroWords(true);
  stageEl.style.background = STAGE_BG_PAGE1;

  heroCircleVisible = false;
  circleAnim = false;
  beltActive = false;
  beltOffset = beltTargetOffset = 0;
  beltY = beltTargetY = 0;
  lastMouseX = null;

  showDotLabels = true;
  setDotsToHome();
  completed = false;
  hasStartedPuzzle = false;
  reset();
  startHintTimer();
  render();
});

resize();
window.addEventListener("resize", resize);
startHintTimer();

})();
</script>
